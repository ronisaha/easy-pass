name: Build & Publish to Google Play

# Triggered when a version tag is pushed, e.g. `git tag v1.0.6 && git push origin v1.0.6`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  # Google Play track to publish to. Start with `internal`, switch to
  # `production` once you are confident in the pipeline.
  PLAY_TRACK: internal
  # Added to the GitHub run number to form the Android versionCode. The result
  # must always be GREATER than the highest versionCode already on Play Console.
  VERSION_CODE_OFFSET: 6

jobs:
  release:
    name: Build signed AAB and upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version info
        id: version
        run: |
          # Tag v1.0.6 -> versionName 1.0.6
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(( GITHUB_RUN_NUMBER + VERSION_CODE_OFFSET ))
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release bundle (AAB)
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: net.xiidea.easypass
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ env.PLAY_TRACK }}
          status: completed

      - name: Archive AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
